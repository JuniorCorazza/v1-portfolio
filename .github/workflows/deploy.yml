name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

# Queue deploys instead of cancelling: `aws s3 sync --delete` is not transactional,
# so aborting one mid-sync could leave the bucket in a half-updated state.
concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  id-token: write # required to request the OIDC token for AWS auth
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync build to S3
        run: aws s3 sync ./dist s3://www.juniorcorazza.com --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E2VJLD288O7RUZ --paths '/*'
