name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

# Queue deploys instead of cancelling: `aws s3 sync --delete` is not transactional,
# so aborting one mid-sync could leave the bucket in a half-updated state.
concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  id-token: write # required to request the OIDC token for AWS auth
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync build to S3
        run: aws s3 sync ./dist s3://www.juniorcorazza.com --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E2VJLD288O7RUZ --paths '/*'
